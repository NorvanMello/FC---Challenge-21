<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Base Apparel coming soon page</title>

</head>
<body>

  <main class="main-card">
    <article class="container">
      <header class="logo">
        <img src="./images/logo.svg" alt="Base Apparel">
      </header>

      <section class="bitmap">
        <picture>
          <source media="(min-width: 48rem)" srcset="./images/hero-desktop.jpg">
          <img src="./images/hero-mobile.jpg" alt="">
        </picture>
        
      </section>

      <section class="text-container">
        <h1><span>WE'RE</span> COMING SOON</h1>
        
        <p> Hello fellow shoppers! We're currently building our new fashion store. 
        Add your email below to stay up-to-date with announcements and our launch deals.</p>

        <form action="#" method="post" novalidate>
          <div class="input-group">
            <input type="email" placeholder="Email Address" id="email" name="email" autocomplete="email" class="form-input" required>
            <button type="submit" class="form-btn"><img src="./images/icon-arrow.svg" alt=""></button>
            <img src="./images/icon-error.svg" alt="" class="error-input-img">
            <span class="invalid-input-msg"></span>
          </div>
        </form>
      </section>
    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
